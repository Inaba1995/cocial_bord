{% extends "base.html" %}
{% load static %}

{% block title %}Редактирование поста — True Social{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-warning text-white py-3">
                    <h4 class="mb-0 text-center">
                <i class="bi bi-pencil me-2"></i>Редактирование поста
            </h4>
        </div>
        <div class="card-body p-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="{% url 'profile' request.user.id %}" class="btn btn-outline-secondary px-4">Отмена</a>
            <button type="submit" class="btn btn-warning px-4">Сохранить изменения</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
{% endblock %}
